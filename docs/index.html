<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sentroy API Documentation has moved</title>
  <meta name="description" content="The Sentroy API documentation now lives at https://sentroy.com/docs." />
  <link rel="icon" href="https://sentroy.com/favicon.ico" />
  <link rel="canonical" href="https://sentroy.com/docs" />
  <meta http-equiv="refresh" content="0; url=https://sentroy.com/docs" />
  <style>
    :root { color-scheme: light dark; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: grid; place-items: center; min-height: 100vh; margin: 0;
      background: #fafafa; color: #111;
    }
    @media (prefers-color-scheme: dark) {
      body { background: #0a0a0a; color: #f5f5f5; }
    }
    main { max-width: 480px; padding: 32px; text-align: center; }
    h1 { font-size: 24px; margin: 0 0 12px; font-weight: 600; }
    p { font-size: 15px; line-height: 1.6; margin: 0 0 20px; opacity: 0.7; }
    a {
      display: inline-block; padding: 10px 20px;
      background: currentColor; border-radius: 8px;
      text-decoration: none; font-weight: 500; font-size: 14px;
    }
    a span { color: #fafafa; }
    @media (prefers-color-scheme: dark) {
      a span { color: #0a0a0a; }
    }
  </style>
</head>
<body>
  <main>
    <h1>Documentation has moved</h1>
    <p>The Sentroy API reference is now hosted at <strong>sentroy.com/docs</strong>. You'll be redirected automatically.</p>
    <a href="https://sentroy.com/docs"><span>Go to sentroy.com/docs</span></a>
  </main>
</body>
</html>
